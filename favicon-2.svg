<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%"  stop-color="#0a0a1a"/>
      <stop offset="100%" stop-color="#1e1b4b"/>
    </linearGradient>
    <linearGradient id="stroke" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%"  stop-color="#22d3ee"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>
  </defs>

  <!-- Hex shape -->
  <polygon points="32,3 58,17 58,47 32,61 6,47 6,17"
           fill="url(#bg)" stroke="url(#stroke)" stroke-width="3"
           stroke-linejoin="round"/>

  <!-- Code brackets framing the O -->
  <g fill="none" stroke="#22d3ee" stroke-width="3"
     stroke-linecap="round" stroke-linejoin="round">
    <path d="M20 22 L14 32 L20 42"/>
    <path d="M44 22 L50 32 L44 42"/>
  </g>

  <!-- Stylised O in the centre -->
  <circle cx="32" cy="32" r="9" fill="none"
          stroke="url(#stroke)" stroke-width="3.5"/>

  <!-- Glowing dot -->
  <circle cx="32" cy="32" r="2" fill="#67e8f9"/>
</svg>
