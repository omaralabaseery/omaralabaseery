<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <radialGradient id="ring" cx="50%" cy="50%" r="50%">
      <stop offset="60%" stop-color="#0a0a1a"/>
      <stop offset="100%" stop-color="#1e1b4b"/>
    </radialGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%"  stop-color="#22d3ee"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>
  </defs>

  <!-- Outer disc -->
  <circle cx="32" cy="32" r="30" fill="url(#ring)"
          stroke="url(#accent)" stroke-width="3"/>

  <!-- Inner ring (orbiting feel) -->
  <circle cx="32" cy="32" r="22" fill="none"
          stroke="#22d3ee" stroke-width="1" stroke-opacity="0.35"
          stroke-dasharray="2 4"/>

  <!-- Terminal prompt: > -->
  <path d="M16 22 L26 32 L16 42"
        fill="none" stroke="url(#accent)" stroke-width="4"
        stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Underscore cursor -->
  <rect x="30" y="40" width="18" height="4" rx="1"
        fill="#67e8f9">
    <animate attributeName="opacity"
             values="1;0;1" dur="1.2s" repeatCount="indefinite"/>
  </rect>

  <!-- Three orbital dots -->
  <circle cx="32" cy="6"  r="2" fill="#22d3ee"/>
  <circle cx="58" cy="32" r="2" fill="#7c3aed"/>
  <circle cx="6"  cy="32" r="2" fill="#ec4899"/>
</svg>
