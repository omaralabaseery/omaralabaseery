<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="g" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#22d3ee"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="1.2" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="64" height="64" rx="14" fill="url(#g)"/>

  <!-- subtle inner highlight -->
  <rect x="2" y="2" width="60" height="60" rx="12" fill="none"
        stroke="rgba(255,255,255,0.18)" stroke-width="1"/>

  <!-- O S monogram -->
  <g fill="#ffffff" filter="url(#glow)" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-weight="800">
    <text x="14" y="44" font-size="32">O</text>
    <text x="34" y="44" font-size="32">S</text>
  </g>

  <!-- small accent dot (AI/tech vibe) -->
  <circle cx="52" cy="14" r="3" fill="#67e8f9"/>
  <circle cx="52" cy="14" r="5" fill="#67e8f9" fill-opacity="0.35"/>
</svg>
